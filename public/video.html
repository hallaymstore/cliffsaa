<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f172a">
    <title>Cliffs | Video Dars</title>
    <link rel="stylesheet" href="/app.css">
    <script src="/app.js" defer></script>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      #app { width: 100%; height: 100%; }
    </style>
  </head>
  <body data-page="video">
    <div id="app"></div>
    <div id="video-call-layer"></div>
    <script>
      // Sahifa yuklanganda video call boshlash
      window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room') || 'demo-room';
        const isTeacher = urlParams.get('teacher') === 'true';
        
        // Video call ni boshlash
        setTimeout(() => {
          if (typeof startGroupCall === 'function') {
            startGroupCall(roomId, isTeacher);
          } else {
            console.error('startGroupCall funksiyasi topilmadi');
          }
        }, 500);
      });
    </script>
  </body>
</html>
